name: Build RU-WHITELIST geodata

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install protobuf

      - name: Show workspace
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type d | sort

      - name: Fetch upstream sources
        run: |
          chmod +x scripts/fetch_sources.sh
          ./scripts/fetch_sources.sh

      - name: Normalize sources
        run: |
          python3 ./scripts/normalize_sources.py

      - name: Build geosite.dat
        run: |
          python3 ./scripts/build_geosite_dat.py

      - name: Build geoip.dat
        run: |
          python3 ./scripts/build_geoip_dat.py

      - name: Verify outputs
        run: |
          test -f output/geosite.dat
          test -f output/geoip.dat

          echo "=== output sizes ==="
          ls -lh output/

          echo "=== smoke tests ==="
          grep -n "2ip.io" data/generated/domains.txt
          strings output/geosite.dat | grep 'RU-WHITELIST'
          strings output/geosite.dat | grep '2ip.io'
          strings output/geoip.dat | grep 'RU-WHITELIST'

      - name: Generate checksums
        run: |
          cd output
          sha256sum geosite.dat geoip.dat > SHA256SUMS
          cat SHA256SUMS

      - name: Upload geodata artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ru-whitelist-geodata
          path: |
            output/geosite.dat
            output/geoip.dat
            output/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geodata-latest
          name: RU-WHITELIST geodata latest
          body: |
            Auto-updated RU-WHITELIST geodata build.

            Files:
            - geosite.dat
            - geoip.dat
            - SHA256SUMS
          make_latest: true
          generate_release_notes: false
          prerelease: false
          files: |
            output/geosite.dat
            output/geoip.dat
            output/SHA256SUMS
          overwrite_files: true

      - name: Write workflow summary
        run: |
          {
            echo "## RU-WHITELIST geodata build"
            echo
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo
            echo "### Output files"
            echo
            echo '```text'
            ls -lh output/
            echo '```'
            echo
            echo "### SHA256"
            echo
            echo '```text'
            cat output/SHA256SUMS
            echo '```'
            echo
            echo "### Stable release URLs"
            echo
            echo "- [geosite.dat](https://github.com/${{ github.repository }}/releases/download/geodata-latest/geosite.dat)"
            echo "- [geoip.dat](https://github.com/${{ github.repository }}/releases/download/geodata-latest/geoip.dat)"
            echo "- [SHA256SUMS](https://github.com/${{ github.repository }}/releases/download/geodata-latest/SHA256SUMS)"
          } >> "$GITHUB_STEP_SUMMARY"
